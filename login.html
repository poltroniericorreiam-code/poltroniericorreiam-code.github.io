<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="login-box">

        <!-- imagem/logo -->
        <img src="04967e18-fe81-4756-94c1-0d94759e3223.png" width="300">

        <h1>Login</h1>

        <!-- campo telefone -->
        <input type="text" placeholder="Telefone ou e-mail">
        <br><br>

        <!-- campo senha -->
        <input type="password" placeholder="Senha">
        <br><br>

        <!-- esqueceu senha -->
        <a href="#">
            Esqueceu sua senha?
        </a>

        <br><br>

        <!-- botão entrar -->
        <button onclick="window.location.href='home.html'">
            Entrar
        </button>

        <br><br>

        <!-- botão cadastrar -->
        <button onclick="window.location.href='cadastro.html'">
            Cadastrar
        </button>

    </div>

</body>

</html>
